# Render Blueprint for the OfferFlow backend + managed Postgres + static frontend.
# Deploy by connecting this repo at https://dashboard.render.com/blueprints
# and filling in the secret env vars marked "sync: false".
#
# After the first deploy Render assigns each service a URL. Then set, in the
# dashboard:
#   offerflow-api:      FRONTEND_URL + ALLOWED_ORIGINS = the frontend's URL
#                       GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
#   offerflow-frontend: VITE_API_URL = the API's URL (e.g. https://offerflow-api.onrender.com)
# and add "<API_URL>/auth/callback" as an authorized redirect URI in Google Cloud.

databases:
  - name: offerflow-db
    plan: free
    databaseName: offerflow
    user: offerflow

services:
  - type: web
    name: offerflow-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Apply migrations, then serve. --proxy-headers lets FastAPI see the real
    # https scheme behind Render's TLS proxy (needed for the OAuth redirect URI
    # and Secure cookies).
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips="*"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DATABASE_URL
        fromDatabase:
          name: offerflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: COOKIE_SAMESITE
        value: none
      - key: COOKIE_SECURE
        value: "true"
      # Public "Try the demo" login (seeded sandbox accounts, no Google sign-in).
      - key: DEMO_MODE_ENABLED
        value: "true"
      # Fill these in the Render dashboard (kept out of source control):
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Set both to the offerflow-frontend URL once it's assigned, e.g.
      # https://offerflow-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: offerflow-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Build-time API base URL. Set to the offerflow-api URL once assigned, e.g.
      # https://offerflow-api.onrender.com
      - key: VITE_API_URL
        sync: false
    # SPA fallback so refreshing any path serves index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
